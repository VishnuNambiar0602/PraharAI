version: '3.8'

services:
  neo4j:
    image: neo4j:5.14-community
    container_name: ai4bharat-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt (driver connection)
    environment:
      NEO4J_AUTH: neo4j/your_secure_password_here
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4JCONF_server_default__listen__address: "0.0.0.0"
      NEO4JCONF_server_bolt_tls__enabled: "false"
    volumes:
      - neo4j_data:/var/lib/neo4j/data
      - neo4j_logs:/var/lib/neo4j/logs
    networks:
      - ai4bharat-network
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "your_secure_password_here", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: If you want to add a Node.js API service
  api:
    build: .
    container_name: ai4bharat-api
    ports:
      - "3000:3000"
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_HOST: neo4j
      NEO4J_PORT: 7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: your_secure_password_here
      NODE_ENV: production
    networks:
      - ai4bharat-network
    restart: unless-stopped

volumes:
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local

networks:
  ai4bharat-network:
    driver: bridge
